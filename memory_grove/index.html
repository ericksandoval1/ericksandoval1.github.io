<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

<body>
  <div id="crosshair"></div>

  <div id="overlay">
    <h1>Memory Grove</h1>
    <p>Click anywhere to enter</p>
    <p>ESC to release</p>
  </div>

  <div id="hint">WASD · MOUSE LOOK · SHIFT SPRINT · SPACE JUMP · E INTERACT</div>
  <div id="panel">Starting…</div>
  <div id="error"></div>
  <div id="legend">
    White grid = 10-unit squares<br>
    Red marker = TV target position<br>
    Yellow pole = easier to spot<br>
    Cyan disc = spawn point
  </div>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>

  <script type="module">
    import * as THREE from 'three';

    const panel = document.getElementById('panel');
    const errorBox = document.getElementById('error');
    const overlay = document.getElementById('overlay');
    const hint = document.getElementById('hint');

    function setPanel(text) { panel.textContent = text; }

    function showError(err) {
      console.error(err);
      errorBox.style.display = 'block';
      errorBox.textContent = String(err && err.stack ? err.stack : err);
      setPanel('Error. Check red box.');
    }

    window.addEventListener('error', (e) => showError(e.error || e.message));
    window.addEventListener('unhandledrejection', (e) => showError(e.reason));

    try {
      const { PointerLockControls } = await import(
        'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/PointerLockControls.js'
      );

        'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js'

      // ── Renderer ────────────────────────────────────────────────────────────────
      const renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = false;
      renderer.outputEncoding = THREE.sRGBEncoding;

      const ambient = new THREE.AmbientLight(0xffe3b0, 0.35);

      scene.add(sun);

      const tvInteractables = [];
      let hoveredTV = null;

      function setHudInfo(text) {
        hudInfo = text;
      }

      function updatePanelText() {
        if (hoveredTV && controls.isLocked) {
          const state = hoveredTV.isOn ? 'ON' : 'OFF';
          const remain = hoveredTV.isOn
            ? Math.max(0, Math.ceil((hoveredTV.autoOffAt - performance.now()) / 1000))

          panel.textContent = hoveredTV.isOn
            ? `${hudInfo} | [E] ${hoveredTV.id} ${state} | Auto-off in ${remain}s`

          panel.textContent = hudInfo;

      function getScreenAspectForModel(modelName) {
        // tweak these if needed
        switch (modelName) {
          case 'wood_crt': return 4 / 3;
          case 'plastic_crt': return 4 / 3;
          case 'old_crt_grey': return 4 / 3;
          case 'oled_silver': return 16 / 9;
          case 'oled_black': return 16 / 9;
          default: return 4 / 3;
        }
      }

      function applyVideoTextureFit(texture, videoWidth, videoHeight, screenAspect, fit = 'contain', rotationDeg = 0) {
        if (!videoWidth || !videoHeight) return;

        let mediaAspect = videoWidth / videoHeight;
        const rot = ((rotationDeg % 360) + 360) % 360;

        // if rotated 90 or 270, swap aspect
        if (rot === 90 || rot === 270) {
          mediaAspect = videoHeight / videoWidth;
        }

        texture.center.set(0.5, 0.5);
        texture.rotation = THREE.MathUtils.degToRad(rotationDeg);

        let repeatX = 1;
        let repeatY = 1;

        if (fit === 'cover') {
          if (mediaAspect > screenAspect) {
            repeatX = screenAspect / mediaAspect;
            repeatY = 1;
          } else {
            repeatX = 1;
            repeatY = mediaAspect / screenAspect;
          }
        } else {
          // contain
          if (mediaAspect > screenAspect) {
            repeatX = 1;
            repeatY = screenAspect / mediaAspect;
          } else {
            repeatX = mediaAspect / screenAspect;
            repeatY = 1;
          }
        }

        texture.repeat.set(repeatX, repeatY);
        texture.offset.set((1 - repeatX) * 0.5, (1 - repeatY) * 0.5);
        texture.needsUpdate = true;
      }

      function applyManualTextureAdjust(texture, cfg = {}) {
        const repeatX = cfg.repeatX ?? 1.0;
        const repeatY = cfg.repeatY ?? 1.0;
        const offsetX = cfg.offsetX ?? 0.0;
        const offsetY = cfg.offsetY ?? 0.0;

        texture.repeat.multiply(new THREE.Vector2(repeatX, repeatY));
        texture.offset.x += offsetX;
        texture.offset.y += offsetY;
        texture.needsUpdate = true;
      }

      function createVideoMaterial(videoConfig, tvId, modelName) {
        const videoPath = typeof videoConfig === 'string' ? videoConfig : videoConfig.src;
        const cfg = typeof videoConfig === 'string' ? {} : videoConfig;

        const video = document.createElement('video');
        video.src = videoPath;
        video.crossOrigin = 'anonymous';
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.preload = 'auto';

        const texture = new THREE.VideoTexture(video);
        texture.encoding = THREE.sRGBEncoding;
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.generateMipmaps = false;

        video.addEventListener('loadedmetadata', () => {
          const screenAspect = getScreenAspectForModel(modelName);

          applyVideoTextureFit(
            texture,
            video.videoWidth,
            video.videoHeight,
            screenAspect,
            cfg.fit ?? 'contain',
            cfg.rotationDeg ?? 0
          );

          applyManualTextureAdjust(texture, cfg);

          console.log(
            `[TV ${tvId}] metadata`,
            `video=${video.videoWidth}x${video.videoHeight}`,
            `rotation=${cfg.rotationDeg ?? 0}`,
            `fit=${cfg.fit ?? 'contain'}`
          );
        });

        video.addEventListener('loadeddata', () => {
          console.log(`[TV ${tvId}] video loaded:`, videoPath);
        });

        video.addEventListener('error', (e) => {
          console.error(`[TV ${tvId}] video error:`, videoPath, e);
        });

        const material = new THREE.MeshBasicMaterial({
          map: texture,
          toneMapped: false
        });

        return { video, texture, material, videoPath };
      }

      function replaceScreenMaterialByModel(root, modelName, videoMaterial) {
        const targetName = SCREEN_MATERIAL_BY_MODEL[modelName];
        if (!targetName) {
          console.warn(`No screen material mapping for model: ${modelName}`);
          return 0;
        }

        const targetLower = targetName.toLowerCase();
        let replaced = 0;

        root.traverse((child) => {
          if (!child.isMesh || !child.material) return;

          if (Array.isArray(child.material)) {
            child.material = child.material.map((mat) => {
              if (mat && mat.name && mat.name.toLowerCase() === targetLower) {
                replaced++;
                return videoMaterial;
              }
              return mat;
            });
          } else {
            if (child.material.name && child.material.name.toLowerCase() === targetLower) {
              replaced++;
              child.material = videoMaterial;
            }
          }
        });

        return replaced;
      }

      function turnOnTV(tvEntry) {
        if (!tvEntry) return;

        tvEntry.autoOffAt = performance.now() + TV_AUTO_OFF_MS;

        if (tvEntry.isOn) return;

        console.log(`Turning ON TV: ${tvEntry.id}`, tvEntry.videoPath);

        tvEntry.video.load();
        tvEntry.video.currentTime = 0;

        tvEntry.video.play().then(() => {
          console.log(`Playing TV: ${tvEntry.id}`);
        }).catch((err) => {
          console.warn(`Video play failed for ${tvEntry.id}:`, err);
        });

        tvEntry.isOn = true;
      }

      function turnOffTV(tvEntry) {
        if (!tvEntry || !tvEntry.isOn) return;
        tvEntry.video.pause();
        tvEntry.video.currentTime = 0;
        tvEntry.isOn = false;
        tvEntry.autoOffAt = 0;
      }

      function toggleTV(tvEntry) {
        if (!tvEntry) return;
        if (tvEntry.isOn) turnOffTV(tvEntry);
        else turnOnTV(tvEntry);
      }

      function getClosestLookedAtTV() {
        const origin = camera.position.clone();
        const forward = new THREE.Vector3();
        camera.getWorldDirection(forward);

        let best = null;
        let bestScore = -Infinity;

        for (const tv of tvInteractables) {
          const targetPos = new THREE.Vector3();
          tv.wrapper.getWorldPosition(targetPos);

          // Aim a little higher than the base so looking at the screen works better
          targetPos.y += 1.6;

          const toTV = targetPos.clone().sub(origin);
          const dist = toTV.length();
          if (dist > INTERACT_DISTANCE) continue;

          toTV.normalize();
          const dot = forward.dot(toTV);

          // lower threshold than 0.94 so interaction is easier
          if (dot > 0.88) {
            // mix aim + distance so closest centered TV wins
            const score = dot - dist * 0.01;
            if (score > bestScore) {
              bestScore = score;
              best = tv;
            }
          }
        }

        return best;
      }

      function fitTextureToMaterial(texture, mediaWidth, mediaHeight, mode = 'cover') {
        if (!mediaWidth || !mediaHeight) return;

        // screen area assumed to be 1:1 unless your UVs already define the shape
        // you can override screenAspect per model if needed
        const videoAspect = mediaWidth / mediaHeight;

        // For most CRT screens, a 4:3 target works better than 1:1
        const screenAspect = 4 / 3;

        texture.center.set(0.5, 0.5);
        texture.rotation = 0;

        if (mode === 'contain') {
          if (videoAspect > screenAspect) {
            texture.repeat.set(1, videoAspect / screenAspect);
          } else {
            texture.repeat.set(screenAspect / videoAspect, 1);
          }
        } else {
          // cover = fill screen, crop overflow
          if (videoAspect > screenAspect) {
            texture.repeat.set(screenAspect / videoAspect, 1);
          } else {
            texture.repeat.set(1, videoAspect / screenAspect);
          }
        }

        texture.offset.set(
          (1 - texture.repeat.x) * 0.5,
          (1 - texture.repeat.y) * 0.5
        );

        texture.needsUpdate = true;
      }

      function updateTVInteraction() {
        hoveredTV = controls.isLocked ? getClosestLookedAtTV() : null;

        if (hoveredTV) {
          const state = hoveredTV.isOn ? 'TURN OFF' : 'TURN ON';
          hint.textContent = `WASD · MOUSE LOOK · SHIFT SPRINT · SPACE JUMP · [E] ${state} ${hoveredTV.id}`;
        } else {
          hint.textContent = 'WASD · MOUSE LOOK · SHIFT SPRINT · SPACE JUMP · E INTERACT';
        }
      }

      function updateTVAutoOff(now) {
        for (const tv of tvInteractables) {
          if (tv.isOn && tv.autoOffAt > 0 && now >= tv.autoOffAt) {
            turnOffTV(tv);
          }
        }
      }

      function stopAllTVs() {
        for (const tv of tvInteractables) {
          turnOffTV(tv);
        }
      }

      function disposeTVSystem() {
        for (const tv of tvInteractables) {
          turnOffTV(tv);
          tv.texture.dispose();
          tv.material.dispose();
          tv.video.removeAttribute('src');
          tv.video.load();
        }
      }

      // ── World layout ────────────────────────────────────────────────────────────
      const START_POINT = new THREE.Vector3(0, 0, 8);

      const wood_crt = {

      const oled_black = {

          { model: 'ico_tree', x: -108, y: 0, z: -28, ry: THREE.MathUtils.degToRad(0), scale: 1.5 },
          { model: 'ico_tree2', x: -97, y: 0, z: -20, ry: THREE.MathUtils.degToRad(72), scale: 1.5 },
          { model: 'ico_tree3', x: -101, y: 0, z: -7, ry: THREE.MathUtils.degToRad(144), scale: 1.5 },
          { model: 'ico_tree', x: -115, y: 0, z: -7, ry: THREE.MathUtils.degToRad(216), scale: 1.5 },
          { model: 'ico_tree2', x: -119, y: 0, z: -20, ry: THREE.MathUtils.degToRad(288), scale: 1.5 },
        ]
      };

      let PATH_TREES = [];

      // ── Collision data ──────────────────────────────────────────────────────────
      const colliders = [];
      const treeTrunkColliders = [];
      const PLAYER_RADIUS = 0.5;
      const PLAYER_HEIGHT = 1.7;
      const JUMP_VELOCITY = 10;
      const GRAVITY = 30;

      function addColliderFromObject(object3D, expand = 0) {
        object3D.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(object3D);
        if (box.isEmpty()) return;
        if (expand !== 0) {
          box.min.x -= expand; box.min.z -= expand;
          box.max.x += expand; box.max.z += expand;
        }
        colliders.push(box);
      }

      function mirrorGroup(group) {
        const mirror = (e) => ({
          ...e,
          id: e.id ? `${e.id.replace(/_\d+$/, '')}_m${(e.id.match(/(\d+)$/) || [, ''])[1]}` : undefined,
          x: -e.x,
          z: -e.z,
          ry: (e.ry ?? 0) + Math.PI
        });
        return { tvs: group.tvs.map(mirror), trees: group.trees.map(mirror) };
      }

      const TV_GROUPS_BASE = [wood_crt, plastic_crt, old_crt_grey, oled_silver, oled_black];
      const TV_GROUPS_MIRROR = [oled_black, oled_silver, old_crt_grey, plastic_crt, wood_crt].map(mirrorGroup);
      const TV_GROUPS = [...TV_GROUPS_BASE, ...TV_GROUPS_MIRROR];

      function groupCenter(group) {
        const tvs = group.tvs;
        return new THREE.Vector3(
          tvs.reduce((s, t) => s + t.x, 0) / tvs.length,
          0,
          tvs.reduce((s, t) => s + t.z, 0) / tvs.length
        );
      }

      function getProtectedPositions() {
        const pts = [];
        for (const group of TV_GROUPS) {
          for (const tv of group.tvs) pts.push({ x: tv.x, z: tv.z, radius: 14 });
          for (const tree of group.trees) pts.push({ x: tree.x, z: tree.z, radius: 9 });
        }
        return pts;
      }

      function isPathTreePositionClear(x, z, protectedPoints) {
        return !protectedPoints.some((p) => {
          const dx = x - p.x, dz = z - p.z;
          return (dx * dx + dz * dz) < (p.radius * p.radius);
        });
      }

      function treeYOffsetFor(model) {
        if (model === 'dead_tree2') return -1.5;
        if (model === 'dead_tree3') return -1.25;
        if (model === 'dead_tree5') return -0.5;
        if (model.startsWith('dead_tree')) return -0.1;
        if (model === 'ico_tree_yellow2' || model === 'ico_tree_yellow3') return -2;
        if (model === 'ico_tree_yellow') return -0.5;
        return 0;
      }

      function treeScaleFor(model) {
        if (model.startsWith('dead_tree')) return 2.0;
        if (model.startsWith('ico_tree')) return 1.1;
        if (model.startsWith('pine_tree')) return 1.7;
        return 2.0;
      }

      const PATH_GROUPS_BASE = [oled_black, oled_silver, old_crt_grey, plastic_crt, wood_crt];
      const PATH_GROUPS_MIRROR = PATH_GROUPS_BASE.map(mirrorGroup);

      const PATH_SEGMENT_MODELS = [
        ['ico_tree', 'ico_tree2', 'ico_tree3', 'pine_tree', 'pine_tree2', 'pine_tree3'],
        ['pine_tree', 'pine_tree2', 'pine_tree3', 'ico_tree_yellow', 'ico_tree_yellow2', 'ico_tree_yellow3'],
        ['ico_tree_yellow', 'ico_tree_yellow2', 'ico_tree_yellow3', 'ico_tree_orange', 'ico_tree_orange2', 'ico_tree_orange3', 'pine_tree_orange', 'pine_tree_orange2', 'pine_tree_orange3'],
        ['pine_tree_orange', 'pine_tree_orange2', 'pine_tree_orange3', 'ico_tree_orange', 'ico_tree_orange2', 'ico_tree_orange3', 'pine_tree_orange', 'ico_tree_orange', 'pine_tree_orange2', 'ico_tree_orange2', 'dead_tree', 'dead_tree1', 'dead_tree2', 'dead_tree3', 'dead_tree4', 'dead_tree5', 'dead_tree', 'dead_tree2', 'dead_tree4'],
      ];

      function buildPathTreesAlongCenters(centerGroups, segmentModelLists, options = {}) {
        const result = [];
        if (centerGroups.length < 2) return result;

        const centers = centerGroups.map(groupCenter);
        const protectedPoints = getProtectedPositions();
        const { samplesPerSegment: defaultSamples = 8, segmentSampleCounts = [], sideOffsetA = 8, sideOffsetB = 14 } = options;

        for (let seg = 0; seg < centers.length - 1; seg++) {
          const curve = new THREE.CatmullRomCurve3([centers[seg], centers[seg + 1]], false, 'catmullrom', 0.0);
          const models = segmentModelLists[seg] ?? ['ico_tree'];
          const samples = segmentSampleCounts[seg] ?? defaultSamples;

          for (let i = 0; i <= samples; i++) {
            const u = i / samples;
            const p = curve.getPointAt(u);
            const tangent = curve.getTangentAt(u).normalize();
            const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
            const sign = i % 2 === 0 ? 1 : -1;

            const offsets = [
              sign * sideOffsetA, -sign * sideOffsetA,
              sign * sideOffsetB, -sign * sideOffsetB,
              sign * (sideOffsetB + 8), -sign * (sideOffsetB + 8),
              sign * (sideOffsetB + 16), -sign * (sideOffsetB + 16),
            ];

            let chosenPos = null;
            for (const offset of offsets) {
              const testPos = p.clone().addScaledVector(normal, offset);
              if (isPathTreePositionClear(testPos.x, testPos.z, protectedPoints)) {
                chosenPos = testPos;
                break;
              }
            }

            if (!chosenPos) continue;

            const model = models[i % models.length];
            result.push({
              model,
              x: chosenPos.x,
              y: treeYOffsetFor(model),
              z: chosenPos.z,
              ry: Math.atan2(tangent.x, tangent.z),
              scale: treeScaleFor(model)
            });
          }
        }

        return result;
      }

      PATH_TREES = [
        ...buildPathTreesAlongCenters(PATH_GROUPS_BASE, PATH_SEGMENT_MODELS, { samplesPerSegment: 8, segmentSampleCounts: [8, 8, 8, 28], sideOffsetA: 10, sideOffsetB: 18 }),
        ...buildPathTreesAlongCenters(PATH_GROUPS_MIRROR, PATH_SEGMENT_MODELS, { samplesPerSegment: 8, segmentSampleCounts: [8, 8, 8, 22], sideOffsetA: 10, sideOffsetB: 18 }),
      ];

      for (const group of TV_GROUPS) {
        for (const tree of group.trees) tree.scale = treeScaleFor(tree.model);
      }
      for (const tree of PATH_TREES) tree.scale = treeScaleFor(tree.model);

      function addTreeTrunkCylinder(x, z, radius = 0.55) {
        treeTrunkColliders.push({ x, z, radius });
      }

      function collidesAtPosition(position) {
        const playerBox = new THREE.Box3(
          new THREE.Vector3(position.x - PLAYER_RADIUS, position.y - PLAYER_HEIGHT, position.z - PLAYER_RADIUS),
          new THREE.Vector3(position.x + PLAYER_RADIUS, position.y, position.z + PLAYER_RADIUS)
        );
        if (colliders.some((box) => playerBox.intersectsBox(box))) return true;

        return treeTrunkColliders.some((trunk) => {
          const dx = position.x - trunk.x;
          const dz = position.z - trunk.z;
          return (dx * dx + dz * dz) < ((PLAYER_RADIUS + trunk.radius) ** 2);
        });
      }

      // ── Placement markers / labels ─────────────────────────────────────────────
      function makeTextSprite(text, opts = {}) {
        const fontSize = opts.fontSize ?? 28;
        const padding = opts.padding ?? 8;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.font = `${fontSize}px monospace`;
        const textWidth = Math.ceil(ctx.measureText(text).width);
        canvas.width = textWidth + padding * 2;
        canvas.height = fontSize + padding * 2;
        ctx.font = `${fontSize}px monospace`;
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
        ctx.fillStyle = 'white';
        ctx.textBaseline = 'top';
        ctx.fillText(text, padding, padding);
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false, depthWrite: false }));
        sprite.scale.set(canvas.width * 0.03, canvas.height * 0.03, 1);
        return sprite;
      }

      function addPlacementMarkers() {
        TV_GROUPS.forEach((group) => {
          group.tvs.forEach((entry) => {
            const { x = 0, y = 0, z = 0 } = entry;

            const marker = new THREE.Mesh(
              new THREE.BoxGeometry(0.9, 0.9, 0.9),
              new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            marker.position.set(x, y + 0.45, z);
            scene.add(marker);

            const pole = new THREE.Mesh(
              new THREE.CylinderGeometry(0.05, 0.05, 2.5, 8),
              new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            pole.position.set(x, y + 1.25, z);
            scene.add(pole);

            const ring = new THREE.Mesh(
              new THREE.TorusGeometry(0.7, 0.06, 8, 24),
              new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            ring.rotation.x = Math.PI / 2;
            ring.position.set(x, y + 0.03, z);
            scene.add(ring);

            // Uncomment if you want labels above each TV
            // const label = makeTextSprite(entry.id, { fontSize: 26, padding: 10 });
            // label.position.set(x, y + 3.0, z);
            // scene.add(label);
          });
        });
      }

      addPlacementMarkers();

      // ── Load models ─────────────────────────────────────────────────────────────
      const loader = new GLTFLoader();
      const MODEL_BASE_PATH = '../assets/tv_models/';
      const TREE_BASE_PATH = '../assets/trees/';

      const modelManifest = {
        wood_crt: 'wood_crt.glb',
        plastic_crt: 'plastic_crt.glb',
        old_crt_grey: 'old_crt_grey.glb',
        oled_silver: 'oled_silver.glb',
        oled_black: 'oled_black.glb',
      };

      const treeManifest = {
        ico_tree: 'ico_tree.glb', ico_tree2: 'ico_tree2.glb', ico_tree3: 'ico_tree3.glb',
        ico_tree_orange: 'ico_tree_orange.glb', ico_tree_orange2: 'ico_tree_orange2.glb', ico_tree_orange3: 'ico_tree_orange3.glb',
        pine_tree: 'pine_tree.glb', pine_tree2: 'pine_tree2.glb', pine_tree3: 'pine_tree3.glb', pine_tree4: 'pine_tree4.glb',
        pine_tree_yellow: 'pine_tree_yellow.glb', pine_tree_yellow2: 'pine_tree_yellow2.glb', pine_tree_yellow3: 'pine_tree_yellow3.glb', pine_tree_yellow4: 'pine_tree_yellow4.glb',
        ico_tree_yellow: 'ico_tree_yellow.glb', ico_tree_yellow2: 'ico_tree_yellow2.glb', ico_tree_yellow3: 'ico_tree_yellow3.glb',
        pine_tree_orange: 'pine_tree_orange.glb', pine_tree_orange2: 'pine_tree_orange2.glb', pine_tree_orange3: 'pine_tree_orange3.glb', pine_tree_orange4: 'pine_tree_orange4.glb',
        dead_tree: 'dead_tree.glb', dead_tree1: 'dead_tree1.glb', dead_tree2: 'dead_tree2.glb',
        dead_tree3: 'dead_tree3.glb', dead_tree4: 'dead_tree4.glb', dead_tree5: 'dead_tree5.glb',
      };

      const treeModels = {};
      const tvModels = {};

      function loadGLTF(url) {
        return new Promise((resolve, reject) => loader.load(url, resolve, undefined, reject));
      }

      function setAllMeshesDoubleSided(root) {
        root.traverse((child) => {
          if (!child.isMesh) return;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach((mat) => { if (mat) mat.side = THREE.DoubleSide; });
        });
      }

      function centerAndGroundModel(modelRoot) {
        modelRoot.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(modelRoot);
        if (box.isEmpty()) return;
        const center = new THREE.Vector3();
        box.getCenter(center);
        modelRoot.position.x -= center.x;
        modelRoot.position.z -= center.z;
        modelRoot.position.y -= box.min.y;
      }

      function placeModel(source, entry, { doubleSided = false, isTV = false } = {}) {
        const wrapper = new THREE.Group();
        wrapper.position.set(entry.x ?? 0, entry.y ?? 0, entry.z ?? 0);
        wrapper.rotation.set(0, entry.ry ?? 0, 0);
        wrapper.scale.setScalar(entry.scale ?? 1);

        const instance = source.clone(true);
        if (doubleSided) setAllMeshesDoubleSided(instance);

        if (isTV) {
          centerAndGroundModel(instance);
        } else {
          const box = new THREE.Box3().setFromObject(instance);
          const center = new THREE.Vector3();
          box.getCenter(center);
          instance.position.x -= center.x;
          instance.position.z -= center.z;
          instance.position.y -= box.min.y;
        }

        wrapper.add(instance);
        scene.add(wrapper);
        return { wrapper, instance };
      }

      function addModelPlacements() {
        TV_GROUPS.forEach((group, gi) => {
          group.tvs.forEach((entry, ti) => {
            const source = tvModels[entry.model];
            if (!source) {
              console.warn(`Missing TV model for group ${gi}, tv ${ti}: ${entry.model}`);
              return;
            }

            const { wrapper, instance } = placeModel(source, entry, { doubleSided: true, isTV: true });
            addColliderFromObject(wrapper, 0.3);

            const videoConfig = TV_VIDEO_BY_ID[entry.id];
            if (!videoConfig) {
              console.warn(`No video assigned for TV id: ${entry.id}`);
              return;
            }

            const { video, texture, material, videoPath } = createVideoMaterial(videoConfig, entry.id, entry.model);
            const replaced = replaceScreenMaterialByModel(instance, entry.model, material);

            console.log(`TV ${entry.id} | model=${entry.model} | video=${videoPath} | replacedMaterials=${replaced}`);

            if (replaced <= 0) {
              console.warn(
                `No matching screen material found on ${entry.model} (${entry.id}). Expected: ${SCREEN_MATERIAL_BY_MODEL[entry.model]}`
              );

              // Debug: print all material names on this TV model
              instance.traverse((child) => {
                if (!child.isMesh || !child.material) return;
                if (Array.isArray(child.material)) {
                  child.material.forEach((mat) => {
                    if (mat) console.log(`[${entry.id}] material:`, mat.name);
                  });
                } else {
                  console.log(`[${entry.id}] material:`, child.material.name);
                }
              });
            }

            const tvEntry = {
              id: entry.id,
              model: entry.model,
              wrapper,
              instance,
              videoPath,
              video,
              texture,
              material,
              isOn: false,
              autoOffAt: 0,
            };

            wrapper.userData.tvEntry = tvEntry;
            tvInteractables.push(tvEntry);
          });
        });
      }

      function addTreePlacements(entries, modelBank) {
        for (const entry of entries) {
          const source = modelBank[entry.model];
          if (!source) {
            console.warn(`Missing tree model: ${entry.model}`);
            continue;
          }
          placeModel(source, entry);
          addTreeTrunkCylinder(entry.x, entry.z, 0.55);
        }
      }

      async function loadAllModels() {
        setPanel('Loading TV models...');

        const loadBank = async (manifest, basePath, bank) => {
          await Promise.all(Object.entries(manifest).map(([key, file]) =>
            loadGLTF(`${basePath}${file}`)
              .then((gltf) => { bank[key] = gltf.scene; })
              .catch((err) => console.error(`Error loading ${file}:`, err))
          ));
        };

        await loadBank(modelManifest, MODEL_BASE_PATH, tvModels);
        addModelPlacements();

        await loadBank(treeManifest, TREE_BASE_PATH, treeModels);
        addTreePlacements(TV_GROUPS.flatMap((g) => g.trees), treeModels);
        addTreePlacements(PATH_TREES, treeModels);

        setHudInfo(
          `Ready | TV Colliders: ${colliders.length} | Tree Trunks: ${treeTrunkColliders.length} | TVs: ${tvInteractables.length}`
        );
        updatePanelText();
      }

      loadAllModels();

      // ── Controls ────────────────────────────────────────────────────────────────
      const controls = new PointerLockControls(camera, renderer.domElement);
      scene.add(controls.getObject());

      camera.position.set(START_POINT.x, 1.7, START_POINT.z);
      camera.lookAt(0, 1.7, 0);

      function tryLock() {
        controls.lock();
      }

      document.addEventListener('click', tryLock);

      controls.addEventListener('lock', () => {
        overlay.style.display = 'none';
      });

      controls.addEventListener('unlock', () => {
        overlay.style.display = 'flex';
        stopAllTVs();
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopAllTVs();
      });

      let verticalVelocity = 0;
      let isOnGround = true;
      const keys = {};

      document.addEventListener('keydown', (e) => {
        keys[e.code] = true;

        if (e.code === 'Space') {
          e.preventDefault();
          if (controls.isLocked && isOnGround) {
            verticalVelocity = JUMP_VELOCITY;
            isOnGround = false;
          }
        }

        if (e.code === 'KeyE' && controls.isLocked) {
          const tv = getClosestLookedAtTV();
          if (tv) {
            toggleTV(tv);
            updatePanelText();
          }
        }
      });

      document.addEventListener('keyup', (e) => {
        keys[e.code] = false;
      });

      // ── Animate ─────────────────────────────────────────────────────────────────
      const _moveDir = new THREE.Vector3();
      let prev = performance.now();
      let frames = 0;
      let lastFpsTime = performance.now();

      function animate() {
        requestAnimationFrame(animate);

        frames++;
        const nowFps = performance.now();
        if (nowFps - lastFpsTime >= 1000) {
          const fwd = new THREE.Vector3();
          camera.getWorldDirection(fwd);
          let lookDeg = THREE.MathUtils.radToDeg(Math.atan2(fwd.x, fwd.z));
          if (lookDeg < 0) lookDeg += 360;

          setHudInfo(
            `FPS: ${frames} | X: ${camera.position.x.toFixed(2)} | Y: ${camera.position.y.toFixed(2)} | Z: ${camera.position.z.toFixed(2)} | Angle: ${lookDeg.toFixed(1)}°`
          );
          frames = 0;
          lastFpsTime = nowFps;
        }

        const now = performance.now();
        const delta = Math.min((now - prev) / 1000, 0.1);
        prev = now;

        updateTVAutoOff(now);

        if (controls.isLocked) {
          const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 25 : 15;
          _moveDir.set(0, 0, 0);

          if (keys['KeyW'] || keys['ArrowUp']) _moveDir.z -= 1;
          if (keys['KeyS'] || keys['ArrowDown']) _moveDir.z += 1;
          if (keys['KeyA'] || keys['ArrowLeft']) _moveDir.x -= 1;
          if (keys['KeyD'] || keys['ArrowRight']) _moveDir.x += 1;

          if (_moveDir.lengthSq() > 0) {
            _moveDir.normalize();

            const moveAmountForward = -_moveDir.z * speed * delta;
            const moveAmountRight = _moveDir.x * speed * delta;

            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3();
            right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

            const tryForward = camera.position.clone().addScaledVector(forward, moveAmountForward);
            if (!collidesAtPosition(tryForward)) controls.moveForward(moveAmountForward);

            const tryRight = camera.position.clone().addScaledVector(right, moveAmountRight);
            if (!collidesAtPosition(tryRight)) controls.moveRight(moveAmountRight);
          }

          verticalVelocity -= GRAVITY * delta;
          camera.position.y += verticalVelocity * delta;

          if (camera.position.y <= PLAYER_HEIGHT) {
            camera.position.y = PLAYER_HEIGHT;
            verticalVelocity = 0;
            isOnGround = true;
          }
        }

        updateTVInteraction();
        updatePanelText();
        renderer.render(scene, camera);
      }

      animate();

      setInterval(() => {
        console.log('Triangles:', renderer.info.render.triangles, 'Draw calls:', renderer.info.render.calls);
      }, 1000);

      window.addEventListener('beforeunload', disposeTVSystem);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

    } catch (err) {
      showError(err);
    }
  </script>
</body>
