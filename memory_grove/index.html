      function getScreenAspectForModel(modelName) {
        switch (modelName) {
          case 'crt_tv': case 'crt_tvgrey': case 'crt_tvsilver': return 4 / 3;
          case 'black_oled1': case 'silver_oled1': return 16 / 9;
          default: return 4 / 3;
        }
      }

      function applyVideoTextureFit(texture, videoWidth, videoHeight, screenAspect, fit = 'contain', rotationDeg = 0, uvZoom = 1.0, offsetX = 0.0, offsetY = 0.0) {
        if (!videoWidth || !videoHeight) return;
        let mediaAspect = videoWidth / videoHeight;
        const rot = ((rotationDeg % 360) + 360) % 360;
        if (rot === 90 || rot === 270) mediaAspect = videoHeight / videoWidth;
        texture.center.set(0.5, 0.5);
        texture.rotation = THREE.MathUtils.degToRad(rotationDeg);
        let repeatX = 1, repeatY = 1;
        if (fit === 'cover') {
          if (mediaAspect > screenAspect) { repeatX = screenAspect / mediaAspect; } else { repeatY = mediaAspect / screenAspect; }
        } else {
          if (mediaAspect > screenAspect) { repeatY = screenAspect / mediaAspect; } else { repeatX = mediaAspect / screenAspect; }
        }
        repeatX *= uvZoom; repeatY *= uvZoom;
        texture.repeat.set(repeatX, repeatY);
        texture.offset.set((1 - repeatX) * 0.5 + offsetX, (1 - repeatY) * 0.5 + offsetY);
        texture.needsUpdate = true;
      }

      function createVideoMaterial(videoConfig, tvId, modelName) {
        const videoPath = typeof videoConfig === 'string' ? videoConfig : videoConfig.src;
        const cfg = typeof videoConfig === 'string' ? {} : videoConfig;
        const video = document.createElement('video');
        Object.assign(video, { src: videoPath, crossOrigin: 'anonymous', loop: true, muted: true, playsInline: true, preload: 'auto' });
        video.load();
        const texture = new THREE.VideoTexture(video);
        Object.assign(texture, { encoding: THREE.sRGBEncoding, minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, generateMipmaps: false });
        video.addEventListener('loadedmetadata', () => {
          applyVideoTextureFit(texture, video.videoWidth, video.videoHeight, getScreenAspectForModel(modelName),
            cfg.fit ?? 'contain', cfg.rotationDeg ?? 0, cfg.uvZoom ?? 1.0, cfg.offsetX ?? 0.0, cfg.offsetY ?? 0.0);
        });
        video.addEventListener('canplay', () => { texture.needsUpdate = true; });
        video.addEventListener('error', (e) => { console.error(`[TV ${tvId}] video error:`, videoPath, e); });
        return { video, texture, material: new THREE.MeshBasicMaterial({ map: texture, toneMapped: false }), videoPath };
      }

      function forEachMeshMaterial(root, callback) {
        root.traverse((child) => {
          if (!child.isMesh || !child.material) return;
          if (Array.isArray(child.material)) { child.material = child.material.map((mat) => callback(mat, child)); }
          else { child.material = callback(child.material, child); }
        });
      }

      function replaceScreenMaterialByModel(root, modelName, videoMaterial) {
        const targetName = SCREEN_MATERIAL_BY_MODEL[modelName];
        if (!targetName) { console.warn(`No screen material mapping for model: ${modelName}`); return 0; }
        const targetLower = targetName.toLowerCase();
        let replaced = 0;
        forEachMeshMaterial(root, (mat) => {
          if (mat && mat.name && mat.name.toLowerCase() === targetLower) { replaced++; return videoMaterial; }
          return mat;
        });
        return replaced;
      }

      function turnOnTV(tvEntry) {
        if (!tvEntry) return;
        tvEntry.autoOffAt = performance.now() + TV_AUTO_OFF_MS;
        if (tvEntry.isOn) return;
        tvEntry.isOn = true;

        const video = tvEntry.video;
        video.muted = false;
        video.volume = 0.3;

        const doPlay = () => {
          const p = video.play();
          if (p !== undefined) {
            p.catch((err) => {
              const msg = String(err || '');
              if (err?.name === 'AbortError' || msg.includes('aborted by the user agent')) return;
              console.warn(`Video play failed for ${tvEntry.id}:`, err);
            });
          }
        };

        if (video.readyState >= 2) {
          doPlay();
        } else {
          const onReady = () => {
            video.removeEventListener('canplay', onReady);
            if (tvEntry.isOn) doPlay();
          };
          video.addEventListener('canplay', onReady);
          if (video.readyState === 0) video.load();
        }
      }

      function turnOffTV(tvEntry) {
        if (!tvEntry || !tvEntry.isOn) return;
        tvEntry.video.pause();
        tvEntry.video.muted = true;
        tvEntry.isOn = false;
        tvEntry.autoOffAt = 0;
      }

      function toggleTV(tvEntry) {
        if (!tvEntry) return;
        tvEntry.isOn ? turnOffTV(tvEntry) : turnOnTV(tvEntry);

      function getClosestLookedAtTV() {
        const origin = camera.position;
        camera.getWorldDirection(TEMP_FORWARD);
        let best = null, bestScore = -Infinity;
        for (const tv of tvInteractables) {
          tv.wrapper.getWorldPosition(TEMP_TARGET);
          TEMP_TARGET.y += 1.6;
          TEMP_TO_TV.copy(TEMP_TARGET).sub(origin);
          const dist = TEMP_TO_TV.length();
          if (dist > INTERACT_DISTANCE) continue;
          TEMP_TO_TV.normalize();
          const dot = TEMP_FORWARD.dot(TEMP_TO_TV);
          if (dot > 0.88) {
            const score = dot - dist * 0.01;
            if (score > bestScore) { bestScore = score; best = tv; }
          }
        }
        return best;
      }

      function addColliderFromObject(object3D, expand = 0) {
        object3D.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(object3D);
        if (box.isEmpty()) return;
        if (expand !== 0) { box.min.x -= expand; box.min.z -= expand; box.max.x += expand; box.max.z += expand; }
        colliders.push(box);
      }

      function mirrorGroup(group) {
        const mirror = (e) => ({
          ...e,
          id: e.id ? `${e.id.replace(/_\d+$/, '')}_m${(e.id.match(/(\d+)$/) || [, ''])[1]}` : undefined,
          x: -e.x, z: -e.z, ry: (e.ry ?? 0) + Math.PI
        });
        return { tvs: group.tvs.map(mirror), trees: group.trees.map(mirror) };
      }

      const TV_GROUPS_BASE   = [wood_crt, plastic_crt, old_crt_grey, oled_silver, oled_black];
      const TV_GROUPS_MIRROR = [oled_black, oled_silver, old_crt_grey, plastic_crt, wood_crt].map(mirrorGroup);
      const TV_GROUPS        = [...TV_GROUPS_BASE, ...TV_GROUPS_MIRROR];

      function groupCenter(group) {
        const { tvs } = group;
        return new THREE.Vector3(
          tvs.reduce((s, t) => s + t.x, 0) / tvs.length, 0,
          tvs.reduce((s, t) => s + t.z, 0) / tvs.length
        );
      }

      function getProtectedPositions() {
        const pts = [];
        for (const group of TV_GROUPS) {
          for (const tv   of group.tvs)   pts.push({ x: tv.x,   z: tv.z,   radius: 14 });
          for (const tree of group.trees) pts.push({ x: tree.x, z: tree.z, radius: 9  });
        }
        return pts;
      }

      function isPathTreePositionClear(x, z, protectedPoints) {
        return !protectedPoints.some((p) => {
          const dx = x - p.x, dz = z - p.z;
          return dx * dx + dz * dz < p.radius * p.radius;
        });
      }

      function treeYOffsetFor(model) {
        if (model === 'dead_tree2') return -1.5;
        if (model === 'dead_tree3') return -1.25;
        if (model === 'dead_tree5') return -0.5;
        if (model.startsWith('dead_tree')) return -0.1;
        if (model === 'ico_tree_yellow2' || model === 'ico_tree_yellow3') return -2;
        if (model === 'ico_tree_yellow') return -0.5;
        return 0;
      }

      function treeScaleFor(model) {
        if (model.startsWith('dead_tree')) return 2.0;
        if (model.startsWith('ico_tree'))  return 1.1;
        if (model.startsWith('pine_tree')) return 1.7;
        return 2.0;
      }

      const PATH_GROUPS_BASE   = [oled_black, oled_silver, old_crt_grey, plastic_crt, wood_crt];
      const PATH_GROUPS_MIRROR = PATH_GROUPS_BASE.map(mirrorGroup);

      const PATH_SEGMENT_MODELS = [
        ['ico_tree', 'ico_tree2', 'ico_tree3', 'pine_tree', 'pine_tree2', 'pine_tree3'],
        ['pine_tree', 'pine_tree2', 'pine_tree3', 'ico_tree_yellow', 'ico_tree_yellow2', 'ico_tree_yellow3'],
        ['ico_tree_yellow', 'ico_tree_yellow2', 'ico_tree_yellow3', 'ico_tree_orange', 'ico_tree_orange2', 'ico_tree_orange3', 'pine_tree_orange', 'pine_tree_orange2', 'pine_tree_orange3'],
        ['pine_tree_orange', 'pine_tree_orange2', 'pine_tree_orange3', 'ico_tree_orange', 'ico_tree_orange2', 'ico_tree_orange3', 'pine_tree_orange', 'ico_tree_orange', 'pine_tree_orange2', 'ico_tree_orange2', 'dead_tree', 'dead_tree2', 'dead_tree3', 'dead_tree4', 'dead_tree5', 'dead_tree', 'dead_tree2', 'dead_tree4'],
      ];

      // ── Seeded pseudo-random (deterministic so layout is consistent on reload) ──
      function seededRand(seed) {
        let s = seed;
        return function () {
          s = (s * 1664525 + 1013904223) & 0xffffffff;
          return (s >>> 0) / 0xffffffff;
        };
      }

      // ── Path tree builder ────────────────────────────────────────────────────────
      // Uses the same offset approach as the original working code, but:
      //  - tries both sides at each sample point (not just one)
      //  - adds jitter to offset distance and Y rotation so it looks organic
      //  - skip chance (~30%) so density is lighter and irregular
      function buildPathTreesAlongCenters(centerGroups, segmentModelLists, options = {}) {
        const result = [];
        if (centerGroups.length < 2) return result;

        const centers = centerGroups.map(groupCenter);
        const protectedPoints = getProtectedPositions();
        const {
          samplesPerSegment: defaultSamples = 8,
          segmentSampleCounts = [],
          sideOffsetA = 10,
          sideOffsetB = 18,
          skipChance = 0.3,   // probability of skipping a candidate spot entirely
          jitter = 3,         // max random lateral jitter in world units
          randSeed = 42,
        } = options;

        const rand = seededRand(randSeed);

        for (let seg = 0; seg < centers.length - 1; seg++) {
          const curve   = new THREE.CatmullRomCurve3([centers[seg], centers[seg + 1]], false, 'catmullrom', 0.0);
          const models  = segmentModelLists[seg] ?? ['ico_tree'];
          const samples = segmentSampleCounts[seg] ?? defaultSamples;

          for (let i = 0; i <= samples; i++) {
            const u       = i / samples;
            const p       = curve.getPointAt(u);
            const tangent = curve.getTangentAt(u).normalize();
            const normal  = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
            const sign    = i % 2 === 0 ? 1 : -1;

            // Two offset layers per side — same structure as original
            const offsets = [
              sign * sideOffsetA,        -sign * sideOffsetA,
              sign * sideOffsetB,        -sign * sideOffsetB,
              sign * (sideOffsetB + 8),  -sign * (sideOffsetB + 8),
              sign * (sideOffsetB + 16), -sign * (sideOffsetB + 16),
            ];

            // Try each offset; place a tree if the spot is clear
            // Skip chance breaks up the regularity so it feels organic
            for (const offset of offsets) {
              if (rand() < skipChance) continue; // randomly leave gaps

              // Add a small random lateral push so trees aren't on a perfect grid
              const jitterAmount = (rand() - 0.5) * 2 * jitter;
              const testPos = p.clone()
                .addScaledVector(normal, offset + jitterAmount);

              if (!isPathTreePositionClear(testPos.x, testPos.z, protectedPoints)) continue;

              const model = models[Math.floor(rand() * models.length)];
              const baseScale = treeScaleFor(model);
              // Slight scale variation (±15%) so adjacent trees aren't identical
              const scaleMult = 0.85 + rand() * 0.3;

              result.push({
                model,
                x: testPos.x,
                y: treeYOffsetFor(model),
                z: testPos.z,
                // Random facing instead of always aligned to path tangent
                ry: rand() * Math.PI * 2,
                scale: baseScale * scaleMult,
              });
            }
          }
        }

        return result;
      }

      PATH_TREES = [
        ...buildPathTreesAlongCenters(PATH_GROUPS_BASE, PATH_SEGMENT_MODELS, {
          samplesPerSegment: 5,
          segmentSampleCounts: [5, 5, 5, 16],
          sideOffsetA: 10,
          sideOffsetB: 18,
          skipChance: 0.5,
          jitter: 3,
          randSeed: 42,
        }),
        ...buildPathTreesAlongCenters(PATH_GROUPS_MIRROR, PATH_SEGMENT_MODELS, {
          samplesPerSegment: 5,
          segmentSampleCounts: [5, 5, 5, 14],
          sideOffsetA: 10,
          sideOffsetB: 18,
          skipChance: 0.5,
          jitter: 3,
          randSeed: 137,
        }),
      ];

      for (const group of TV_GROUPS) {
        for (const tree of group.trees) tree.scale = treeScaleFor(tree.model);
      }

      function addTreeTrunkCylinder(x, z, radius = 0.55) { treeTrunkColliders.push({ x, z, radius }); }

      function collidesAtPosition(position) {
        const playerBox = new THREE.Box3(
          new THREE.Vector3(position.x - PLAYER_RADIUS, position.y - PLAYER_HEIGHT, position.z - PLAYER_RADIUS),
          new THREE.Vector3(position.x + PLAYER_RADIUS, position.y,                 position.z + PLAYER_RADIUS)
        );
        if (colliders.some((box) => playerBox.intersectsBox(box))) return true;
        return treeTrunkColliders.some((trunk) => {
          const dx = position.x - trunk.x, dz = position.z - trunk.z;
          return dx * dx + dz * dz < (PLAYER_RADIUS + trunk.radius) ** 2;
        });
      }

      // ── Group beacons ────────────────────────────────────────────────────────────
      // Each TV group gets a two-layer beacon: a wide soft base haze at ground level
      // and a taller narrow column sprite above it, giving the impression of a
      // volumetric light pillar rising from the cluster. Single shared textures.
      // Cost: 20 sprites total (2 per group × 10 groups), all additive blended.

      const beaconSprites = [];

      function createGlowTexture(size = 128, innerAlpha = 0.7, outerAlpha = 0.0) {
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');
        const r = size / 2;
        const grad = ctx.createRadialGradient(r, r, 0, r, r, r);
        grad.addColorStop(0,    `rgba(180, 220, 255, ${innerAlpha})`);
        grad.addColorStop(0.3,  `rgba(140, 180, 255, ${innerAlpha * 0.35})`);
        grad.addColorStop(1,    `rgba( 80, 120, 220, ${outerAlpha})`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
        const tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;
        return tex;
      }

      // Tall narrow column texture — elongated radial fade
      function createColumnTexture(w = 32, h = 256) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0,    'rgba(180, 220, 255, 0.0)');
        grad.addColorStop(0.15, 'rgba(180, 220, 255, 0.55)');
        grad.addColorStop(0.5,  'rgba(140, 190, 255, 0.3)');
        grad.addColorStop(1,    'rgba( 80, 120, 220, 0.0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        const tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;
        return tex;
      }

      function addGroupBeacons() {
        const hazeTex   = createGlowTexture(128, 0.75, 0.0);
        const columnTex = createColumnTexture(32, 256);

        const hazeMat = new THREE.SpriteMaterial({
          map: hazeTex, transparent: true,
          depthWrite: false, blending: THREE.AdditiveBlending,
          fog: false,
        });
        const columnMat = new THREE.SpriteMaterial({
          map: columnTex, transparent: true,
          depthWrite: false, blending: THREE.AdditiveBlending,
          fog: false,
        });

        for (const group of TV_GROUPS) {
          const center = groupCenter(group);

          // Wide base haze hovering just above ground
          const haze = new THREE.Sprite(hazeMat);
          haze.scale.set(36, 36, 1);
          const hazeBaseY = 1.0;
          haze.position.set(center.x, hazeBaseY, center.z);
          scene.add(haze);

          // Tall column rising above the cluster
          const column = new THREE.Sprite(columnMat);
          column.scale.set(8, 70, 1);
          const colBaseY = 36;
          column.position.set(center.x, colBaseY, center.z);
          scene.add(column);

          beaconSprites.push({
            haze, column,
            hazeBaseY, colBaseY,
            phase: Math.random() * Math.PI * 2,
          });
        }
      }

      addGroupBeacons();

      function updateBeacons(t) {
        for (const b of beaconSprites) {
          const slow = Math.sin(t * 0.5 + b.phase);
          const fast = Math.sin(t * 1.4 + b.phase + 1.2);

          // Distance from camera to this beacon's ground center
          const dx = camera.position.x - b.haze.position.x;
          const dz = camera.position.z - b.haze.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);

          // Remap distance to a 0–1 proximity value.
          // NEAR_DIST = full brightness, FAR_DIST = minimum brightness.
          const NEAR_DIST = 30;
          const FAR_DIST  = 220;
          const proximity = 1 - Math.min(1, Math.max(0, (dist - NEAR_DIST) / (FAR_DIST - NEAR_DIST)));
          // Ease it so the falloff feels smooth rather than linear
          const eased = proximity * proximity;

          // Haze: dim at distance (0.08), bright up close (0.9), plus slow pulse
          const hazeBase = 0.08 + 0.82 * eased;
          b.haze.material.opacity = hazeBase * (0.8 + 0.2 * (0.5 + 0.5 * slow));
          b.haze.position.y = b.hazeBaseY + slow * 0.6;

          // Column: stays more visible at range than haze (easier to spot from far)
          // but still brightens noticeably as you approach
          const colBase = 0.15 + 0.65 * eased;
          b.column.material.opacity = colBase * (0.75 + 0.25 * (0.5 + 0.5 * (slow * 0.7 + fast * 0.3)));
          b.column.position.y = b.colBaseY + slow * 1.5;
        }
      }

      // ── Loaders ─────────────────────────────────────────────────────────────────
      const loader          = new GLTFLoader();
      const MODEL_BASE_PATH = '../assets/tv_models/';
      const TREE_BASE_PATH  = '../assets/trees/';

      const modelManifest = {
        black_oled1: 'black_oled1.glb', silver_oled1: 'silver_oled1.glb',
        crt_tv: 'crt_tv.glb', crt_tvgrey: 'crt_tvgrey.glb', crt_tvsilver: 'crt_tvsilver.glb',
      };

      const treeManifest = {
        ico_tree: 'ico_tree.glb', ico_tree2: 'ico_tree2.glb', ico_tree3: 'ico_tree3.glb',
        ico_tree_orange: 'ico_tree_orange.glb', ico_tree_orange2: 'ico_tree_orange2.glb', ico_tree_orange3: 'ico_tree_orange3.glb',
        pine_tree: 'pine_tree.glb', pine_tree2: 'pine_tree2.glb', pine_tree3: 'pine_tree3.glb', pine_tree4: 'pine_tree4.glb',
        pine_tree_yellow: 'pine_tree_yellow.glb', pine_tree_yellow2: 'pine_tree_yellow2.glb', pine_tree_yellow3: 'pine_tree_yellow3.glb', pine_tree_yellow4: 'pine_tree_yellow4.glb',
        ico_tree_yellow: 'ico_tree_yellow.glb', ico_tree_yellow2: 'ico_tree_yellow2.glb', ico_tree_yellow3: 'ico_tree_yellow3.glb',
        pine_tree_orange: 'pine_tree_orange.glb', pine_tree_orange2: 'pine_tree_orange2.glb', pine_tree_orange3: 'pine_tree_orange3.glb', pine_tree_orange4: 'pine_tree_orange4.glb',
        dead_tree: 'dead_tree.glb', dead_tree2: 'dead_tree2.glb', dead_tree3: 'dead_tree3.glb', dead_tree4: 'dead_tree4.glb', dead_tree5: 'dead_tree5.glb',
      };

      const treeModels = {};
      const tvModels   = {};

      function loadGLTF(url) {
        return new Promise((resolve, reject) => loader.load(url, resolve, undefined, reject));
      }

      function setAllMeshesDoubleSided(root) {
        root.traverse((child) => {
          if (!child.isMesh) return;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach((mat) => { if (mat) mat.side = THREE.DoubleSide; });
        });
      }

      function centerAndGroundModel(modelRoot) {
        modelRoot.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(modelRoot);
        if (box.isEmpty()) return;
        const center = new THREE.Vector3();
        box.getCenter(center);
        modelRoot.position.x -= center.x;
        modelRoot.position.z -= center.z;
        modelRoot.position.y -= box.min.y;
      }

      // ── placeModel — used for TVs AND group trees (original clone approach) ─────
      function placeModel(source, entry, { doubleSided = false, isTV = false } = {}) {
        const wrapper = new THREE.Group();
        wrapper.position.set(entry.x ?? 0, entry.y ?? 0, entry.z ?? 0);
        wrapper.rotation.set(0, entry.ry ?? 0, 0);
        wrapper.scale.setScalar(entry.scale ?? 1);
        const instance = source.clone(true);
        if (doubleSided) setAllMeshesDoubleSided(instance);
        if (isTV) {
          centerAndGroundModel(instance);
        } else {
          const box = new THREE.Box3().setFromObject(instance);
          const center = new THREE.Vector3();
          box.getCenter(center);
          instance.position.x -= center.x;
          instance.position.z -= center.z;
          instance.position.y -= box.min.y;
        }
        wrapper.add(instance);
        scene.add(wrapper);
        return { wrapper, instance };
      }

      function addModelPlacements() {
        TV_GROUPS.forEach((group, gi) => {
          group.tvs.forEach((entry, ti) => {
            const source = tvModels[entry.model];
            if (!source) { console.warn(`Missing TV model for group ${gi}, tv ${ti}: ${entry.model}`); return; }
            const { wrapper, instance } = placeModel(source, entry, { doubleSided: true, isTV: true });
            addColliderFromObject(wrapper, 0.3);
            const videoConfig = TV_VIDEO_BY_ID[entry.id];
            if (!videoConfig) { console.warn(`No video assigned for TV id: ${entry.id}`); return; }
            const { video, texture, material, videoPath } = createVideoMaterial(videoConfig, entry.id, entry.model);
            const replaced = replaceScreenMaterialByModel(instance, entry.model, material);
            if (replaced <= 0) {
              console.warn(`No screen material found on ${entry.model} (${entry.id})`);
            }
            const tvEntry = { id: entry.id, model: entry.model, wrapper, instance, videoPath, video, texture, material, isOn: false, autoOffAt: 0 };
            wrapper.userData.tvEntry = tvEntry;
            tvInteractables.push(tvEntry);
          });
        });
      }

      // ── Group tree placement — same clone approach as original ──────────────────
      function addTreePlacements(entries, modelBank) {
        for (const entry of entries) {
          const source = modelBank[entry.model];
          if (!source) { console.warn(`Missing tree model: ${entry.model}`); continue; }
          placeModel(source, entry);
          addTreeTrunkCylinder(entry.x, entry.z, 0.55);
        }
      }

      // ── Instanced placement — used only for PATH_TREES ──────────────────────────
      // Bakes each sub-mesh's matrixWorld into geometry so multi-part GLBs
      // (trunk + foliage as separate meshes) sit at the right height and position.
      const _iMat  = new THREE.Matrix4();
      const _iPos  = new THREE.Vector3();
      const _iQuat = new THREE.Quaternion();
      const _iScl  = new THREE.Vector3();
      const _iEul  = new THREE.Euler();

      function buildInstancedMeshesForModel(sourceGLB, placements) {
        sourceGLB.updateMatrixWorld(true);
        const sourceMeshes = [];
        sourceGLB.traverse((child) => { if (child.isMesh) sourceMeshes.push(child); });

        for (const sourceMesh of sourceMeshes) {
          // Clone geometry and bake the sub-mesh's local transform into vertices.
          // This correctly positions foliage above trunk, grounds the model, etc.
          const geo = sourceMesh.geometry.clone();
          geo.applyMatrix4(sourceMesh.matrixWorld);

          const instanced = new THREE.InstancedMesh(geo, sourceMesh.material, placements.length);
          instanced.frustumCulled = false;

          for (let i = 0; i < placements.length; i++) {
            const e = placements[i];
            _iPos.set(e.x, e.y, e.z);
            _iEul.set(0, e.ry ?? 0, 0);
            _iQuat.setFromEuler(_iEul);
            _iScl.setScalar(e.scale ?? 1);
            _iMat.compose(_iPos, _iQuat, _iScl);
            instanced.setMatrixAt(i, _iMat);
          }

          instanced.instanceMatrix.needsUpdate = true;
          scene.add(instanced);
        }
      }

      function addInstancedPathTrees(entries, modelBank) {
        // Trunk colliders still registered the normal way
        for (const entry of entries) addTreeTrunkCylinder(entry.x, entry.z, 0.55);

        // Group by model, one InstancedMesh batch per model type
        const groups = {};
        for (const entry of entries) {
          if (!groups[entry.model]) groups[entry.model] = [];
          groups[entry.model].push(entry);
        }
        for (const [modelName, placements] of Object.entries(groups)) {
          const source = modelBank[modelName];
          if (!source) { console.warn(`Missing tree model: ${modelName}`); continue; }
          buildInstancedMeshesForModel(source, placements);
        }
      }

      // ── Load everything ──────────────────────────────────────────────────────────
      function setLoadingStatus(msg, pct) {
        loadingStatus.textContent = msg;
        loadingBar.style.width = `${pct}%`;
      }
      // video, so UV fit is applied before the world is revealed. Times out after
      // 8 s per video so a stalled file never blocks the whole load.
      function waitForAllVideoMetadata() {
        return Promise.all(
          tvInteractables.map(({ video, id }) =>
            new Promise((resolve) => {
              // Kick off loading so headers arrive during the loading screen
              if (video.readyState === 0) video.load();
              if (video.readyState >= 1) { resolve(); return; }
              const done = () => { video.removeEventListener('loadedmetadata', done); resolve(); };
              video.addEventListener('loadedmetadata', done);
              setTimeout(resolve, 8000);
            })
          )
        );
      }

      async function loadAllModels() {
        setLoadingStatus('Loading TV models…', 5);

        const loadBank = async (manifest, basePath, bank) => {
          await Promise.all(Object.entries(manifest).map(([key, file]) =>
            loadGLTF(`${basePath}${file}`)
              .then((gltf) => { bank[key] = gltf.scene; })
              .catch((err) => console.error(`Error loading ${file}:`, err))
          ));
        };

        await loadBank(modelManifest, MODEL_BASE_PATH, tvModels);
        setLoadingStatus('Placing TVs…', 25);
        addModelPlacements();

        setLoadingStatus('Loading tree models…', 40);
        await loadBank(treeManifest, TREE_BASE_PATH, treeModels);

        setLoadingStatus('Placing trees…', 70);
        addTreePlacements(TV_GROUPS.flatMap((g) => g.trees), treeModels);
        addInstancedPathTrees(PATH_TREES, treeModels);

        setLoadingStatus('Waiting for video data…', 85);
        await waitForAllVideoMetadata();

        setLoadingStatus('Ready.', 100);

        // Short pause so the bar visually hits 100% before fading
        await new Promise((r) => setTimeout(r, 400));

        // Fade out loading screen, then show the enter overlay
        loadingScreen.classList.add('fade-out');
        loadingScreen.addEventListener('transitionend', () => {
          loadingScreen.style.display = 'none';
          overlay.style.display = 'flex';
        }, { once: true });
      }

      loadAllModels();

      // ── Controls ────────────────────────────────────────────────────────────────
      const controls = new PointerLockControls(camera, renderer.domElement);
      scene.add(controls.getObject());
      camera.position.set(START_POINT.x, 1.7, START_POINT.z);
      camera.lookAt(0, 1.7, 0);

      // Prime all videos on the first user gesture. Browsers require a gesture
      // before buffering video content — this kicks off load() on every TV video
      // so they start filling their buffers the moment the user clicks to enter,
      // giving them the best chance of being ready when the player walks up.
      let videosPrimed = false;
      function primeAllVideos() {
        if (videosPrimed) return;
        videosPrimed = true;
        for (const tv of tvInteractables) {
          if (tv.video.readyState === 0) tv.video.load();
        }
      }

      document.addEventListener('click', () => {
        // Only allow locking once the enter overlay is visible (load complete)
        if (overlay.style.display === 'none') return;
        primeAllVideos();
        controls.lock();
      });
      controls.addEventListener('lock',   () => { overlay.style.display = 'none'; });
      controls.addEventListener('unlock', () => { overlay.style.display = 'flex'; stopAllTVs(); });
      document.addEventListener('visibilitychange', () => { if (document.hidden) stopAllTVs(); });

      let verticalVelocity = 0;
      let isOnGround = true;
      const keys = {};

      document.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        keys[e.code] = true;
        if (e.code === 'Space') {
          e.preventDefault();
          if (controls.isLocked && isOnGround) { verticalVelocity = JUMP_VELOCITY; isOnGround = false; }
        }
        if (e.code === 'KeyE' && controls.isLocked) {
          const tv = getClosestLookedAtTV();
          if (tv) toggleTV(tv);
        }
      });
      document.addEventListener('keyup', (e) => { keys[e.code] = false; });

      // ── Animate ─────────────────────────────────────────────────────────────────
      const moveDir = new THREE.Vector3();
      let prev = performance.now();

      function animate() {
        requestAnimationFrame(animate);

        const now   = performance.now();
        const delta = Math.min((now - prev) / 1000, 0.1);
        prev = now;

        updateTVAutoOff(now);

        if (controls.isLocked) {
          const speed = (keys.ShiftLeft || keys.ShiftRight) ? 25 : 15;
          moveDir.set(0, 0, 0);
          if (keys.KeyW || keys.ArrowUp)    moveDir.z -= 1;
          if (keys.KeyS || keys.ArrowDown)  moveDir.z += 1;
          if (keys.KeyA || keys.ArrowLeft)  moveDir.x -= 1;
          if (keys.KeyD || keys.ArrowRight) moveDir.x += 1;

          if (moveDir.lengthSq() > 0) {
            moveDir.normalize();
            const moveAmountForward = -moveDir.z * speed * delta;
            const moveAmountRight   =  moveDir.x * speed * delta;
            camera.getWorldDirection(TEMP_FORWARD);
            TEMP_FORWARD.y = 0; TEMP_FORWARD.normalize();
            TEMP_RIGHT.crossVectors(TEMP_FORWARD, UP).normalize();
            const tryForward = camera.position.clone().addScaledVector(TEMP_FORWARD, moveAmountForward);
            if (!collidesAtPosition(tryForward)) controls.moveForward(moveAmountForward);
            const tryRight = camera.position.clone().addScaledVector(TEMP_RIGHT, moveAmountRight);
            if (!collidesAtPosition(tryRight)) controls.moveRight(moveAmountRight);
          }

          verticalVelocity -= GRAVITY * delta;
          camera.position.y += verticalVelocity * delta;
          if (camera.position.y <= PLAYER_HEIGHT) {
            camera.position.y = PLAYER_HEIGHT;
            verticalVelocity  = 0;
            isOnGround        = true;
          }
        }

        updateTVInteraction();
        updateBeacons(now / 1000);
        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('beforeunload', disposeTVSystem);
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

    } catch (err) {
      showError(err);
    }
  </script>
</body>

</html>
