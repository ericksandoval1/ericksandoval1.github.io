<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spiral World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 10;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.8);
  }
  #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
  #crosshair::after  { width: 20px; height: 2px; top: 9px; left: 0; }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff; font: 14px/2 monospace;
    cursor: pointer; z-index: 20;
    letter-spacing: 2px; text-transform: uppercase;
  }
  #overlay h1 { font-size: 24px; margin-bottom: 8px; }
  #overlay p  { font-size: 11px; color: #888; }
  #hint {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font: 11px monospace; letter-spacing: 2px;
    pointer-events: none; z-index: 10;
  }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="overlay">
  <h1>Spiral World</h1>
  <p>Click to enter — ESC to release</p>
</div>
<div id="hint">WASD · MOUSE LOOK · SHIFT SPRINT</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
const { PointerLockControls } = await import('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/PointerLockControls.js');
const { GLTFLoader } = await import('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js');

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x87ceeb, 0.008);

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 400);

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xfff4d0, 1.2);
sun.position.set(40, 80, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 400;
sun.shadow.camera.left = -200; sun.shadow.camera.right = 200;
sun.shadow.camera.top  =  200; sun.shadow.camera.bottom = -200;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3d6b30, 0.4));

// ── Ground ────────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(800, 800),
  new THREE.MeshLambertMaterial({ color: 0x4a7c3f })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ══════════════════════════════════════════════════
// ★ TWEAK THESE
const SPIRAL_A = 6;    // starting radius
const SPIRAL_B = 8;    // spacing between arms
const TURNS    = 2.2;  // number of rotations
const SAMPLES  = 1200; // smoothness (higher = smoother, don't go below 800)
// ══════════════════════════════════════════════════

// ── Build centerline points using correct Archimedean formula ─────────────────
// r = SPIRAL_A + SPIRAL_B * (angle / (2*PI))
// This gives even spacing between arms regardless of turns
const centerline = [];
for (let i = 0; i <= SAMPLES; i++) {
  const t     = i / SAMPLES;
  const angle = t * TURNS * Math.PI * 2;        // total angle swept
  const r     = SPIRAL_A + SPIRAL_B * (angle / (Math.PI * 2)); // r grows per full rotation
  centerline.push(new THREE.Vector3(
    Math.cos(angle) * r,
    0,
    Math.sin(angle) * r
  ));
}



// ── Load models ───────────────────────────────────
const loader = new GLTFLoader();
const treeModels = { pine: [], dead: [], ico: [] };
let modelsLoaded = 0;
const totalModels = 13; // 4 pine + 6 dead + 3 ico

// Load pine tree variants
for (let i = 1; i <= 4; i++) {
  loader.load(
    `../assets/trees/pine_tree${i === 1 ? '' : i}.glb`,
    (gltf) => {
      treeModels.pine.push(gltf.scene);
      modelsLoaded++;
    },
    undefined,
    (error) => console.error('Tree loading error:', error)
  );
}

// Load dead tree variants
for (let i = 1; i <= 6; i++) {
  loader.load(
    `../assets/trees/dead_tree${i === 1 ? '' : i}.glb`,
    (gltf) => {
      treeModels.dead.push(gltf.scene);
      modelsLoaded++;
    },
    undefined,
    (error) => console.error('Tree loading error:', error)
  );
}

// Load ico tree variants
for (let i = 1; i <= 3; i++) {
  loader.load(
    `../assets/trees/ico_tree${i === 1 ? '' : i}.glb`,
    (gltf) => {
      treeModels.ico.push(gltf.scene);
      modelsLoaded++;
    },
    undefined,
    (error) => console.error('Tree loading error:', error)
  );
}

// ── Place tree clusters ──────────────
function placeModels() {
  // Place tree clusters at regular intervals along the spiral
  const clusterSpacing = SAMPLES / 3; // 3 clusters (more separation)
  const treeTypes = ['pine', 'dead', 'ico'];
  
  for (let c = 0; c < 3; c++) {
    const pointIdx = Math.floor(c * clusterSpacing);
    if (pointIdx >= centerline.length) break;
    
    const clusterCenter = centerline[pointIdx];
    const treeType = treeTypes[c % 3]; // Cycle through tree types
    const treeArray = treeModels[treeType];
    
    // Place 4-5 trees around each cluster point
    for (let t = 0; t < 5; t++) {
      if (!treeArray || treeArray.length === 0) continue;
      
      const treeVariant = treeArray[Math.floor(Math.random() * treeArray.length)];
      const tree = treeVariant.clone();
      const distance = 8 + Math.random() * 8; // 8-16 units from cluster center
      const angle = (t / 5) * Math.PI * 2 + Math.random() * 0.5;
      
      tree.position.set(
        clusterCenter.x + Math.cos(angle) * distance,
        0,
        clusterCenter.z + Math.sin(angle) * distance
      );
      
      tree.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      
      scene.add(tree);
    }
  }
}

// Wait for models to load before placing them
const modelCheckInterval = setInterval(() => {
  if (modelsLoaded === totalModels) {
    clearInterval(modelCheckInterval);
    placeModels();
  }
}, 100);

// ── Controls ──────────────────────────────────────
const controls = new PointerLockControls(camera, renderer.domElement);
scene.add(controls.getObject());

// Spawn at entrance facing into spiral
camera.position.set(centerline[0].x, 1.7, centerline[0].z + 4);
const lookTarget = centerline[10];
camera.lookAt(lookTarget.x, 1.7, lookTarget.z);

const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => controls.lock());
controls.addEventListener('lock',   () => overlay.style.display = 'none');
controls.addEventListener('unlock', () => overlay.style.display = 'flex');

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── Animate ───────────────────────────────────────
let prev = performance.now();
function animate() {
  requestAnimationFrame(animate);
  if (controls.isLocked) {
    const now   = performance.now();
    const delta = Math.min((now - prev) / 1000, 0.1);
    prev = now;
    const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 10 : 5;
    const dir   = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 2;
    if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 2;
    if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 2;
    if (keys['KeyD'] || keys['ArrowRight']) dir.x += 2;
    dir.normalize();
    controls.moveForward(-dir.z * speed * delta);
    controls.moveRight(dir.x * speed * delta);
    camera.position.y = 3.7;
  } else {
    prev = performance.now();
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
