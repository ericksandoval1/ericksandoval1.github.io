<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tree Ring World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }

  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
  }

  #crosshair::before,
  #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.8);
  }

  #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
  #crosshair::after  { width: 20px; height: 2px; top: 9px; left: 0; }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font: 14px/2 monospace;
    cursor: pointer;
    z-index: 20;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #overlay h1 { font-size: 24px; margin-bottom: 8px; }
  #overlay p  { font-size: 11px; color: #888; }

  #hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font: 11px monospace;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="overlay">
  <h1>Tree Ring World</h1>
  <p>Click to enter — ESC to release</p>
</div>
<div id="hint">WASD · MOUSE LOOK · SHIFT SPRINT</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const { PointerLockControls } = await import(
  'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/PointerLockControls.js'
);

const { GLTFLoader } = await import(
  'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js'
);

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);

// PERF: Shadows disabled entirely — the shadow map was computed every frame
// even though tree meshes had castShadow = false, the DirectionalLight still
// maintained a 512x512 depth pass. Removing this cuts ~1 full render pass.
renderer.shadowMap.enabled = false;

renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// PERF: Reduced fog density from 0.008 to 0.005.
// Denser fog forces the GPU to shade more distant fragments before discarding
// them, increasing overdraw. Lighter fog lets the frustum culler do more work.
scene.fog = new THREE.FogExp2(0x87ceeb, 0.005);

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 500);

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

// PERF: castShadow removed from the sun light — no shadow map is computed at all.
const sun = new THREE.DirectionalLight(0xfff4d0, 1.0);
sun.position.set(40, 80, 20);
scene.add(sun);

scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3d6b30, 0.4));

// ── Ground ────────────────────────────────────────────────────────────────────
// PERF: receiveShadow removed — no shadow map means nothing to receive.
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(800, 800),
  new THREE.MeshLambertMaterial({ color: 0x4a7c3f })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ── World layout ──────────────────────────────────────────────────────────────
const START_POINT = new THREE.Vector3(0, 0, 0);
const TREE_RING_RADIUS = 42;
const CLUSTER_COUNT = 5;
const TREES_PER_CLUSTER = 5;

// ── Load models ───────────────────────────────────────────────────────────────
const loader = new GLTFLoader();

const modelManifest = {
  pine: [
    'pine_tree.glb',
    'pine_tree2.glb',
    'pine_tree3.glb',
    'pine_tree4.glb',
    'pine_tree_yellow.glb',
    'pine_tree_yellow2.glb',
    'pine_tree_yellow3.glb',
    'pine_tree_yellow4.glb',
    'pine_tree_orange.glb',
    'pine_tree_orange2.glb',
    'pine_tree_orange3.glb',
    'pine_tree_orange4.glb',
  ],
  dead: [
    'dead_pine.glb',
    'dead_pine2.glb',
    'dead_tree.glb',
    'dead_tree2.glb',
    'dead_tree3.glb',
    'dead_tree4.glb',
    'dead_tree5.glb',
    'dead_tree6.glb',
  ],
  ico: [
    'ico_tree.glb',
    'ico_tree2.glb',
    'ico_tree3.glb',
    'ico_tree_yellow.glb',
    'ico_tree_yellow2.glb',
    'ico_tree_yellow3.glb',
    'ico_tree_orange.glb',
    'ico_tree_orange2.glb',
    'ico_tree_orange3.glb',
  ]
};

// treeModels stores raw loaded scenes (not cloned).
const treeModels = {};

function loadGLTF(url) {
  return new Promise((resolve, reject) => {
    loader.load(url, resolve, undefined, reject);
  });
}

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function choose(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(array) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Tree placement using InstancedMesh ────────────────────────────────────────
//
// PERF: The original code called gltf.scene.clone(true) for every tree and
// added each clone to the scene individually. With 25 trees that is 25+ separate
// draw calls per frame (more if meshes have multiple materials).
//
// InstancedMesh renders all instances of the same geometry in a SINGLE draw
// call by uploading a matrix per instance to the GPU. For N trees sharing a
// geometry this drops from N draw calls to 1.
//
// Strategy:
//   1. Collect all desired tree placements (position, rotation, scale, variant).
//   2. Group placements by their source GLTF scene (the "variant").
//   3. For each variant, extract every child Mesh and build one InstancedMesh
//      per child geometry, applying the per-instance transform on top of the
//      child's local transform.
//
// This preserves multi-mesh GLTFs (e.g. trunk + foliage as separate meshes)
// while still batching instances.

function buildInstances(placements) {
  // Group placements by variant reference (object identity as key).
  const variantMap = new Map();

  for (const p of placements) {
    if (!variantMap.has(p.variant)) variantMap.set(p.variant, []);
    variantMap.get(p.variant).push(p);
  }

  const dummy = new THREE.Object3D();

  for (const [variantScene, instances] of variantMap) {
    // Collect leaf Meshes with their local-to-scene transforms.
    const meshNodes = [];
    variantScene.traverse((child) => {
      if (child.isMesh) meshNodes.push(child);
    });

    for (const meshNode of meshNodes) {
      // Bake the mesh node's local-to-scene transform once.
      meshNode.updateWorldMatrix(true, false);
      const localMatrix = meshNode.matrixWorld.clone();

      const instMesh = new THREE.InstancedMesh(
        meshNode.geometry,
        meshNode.material,
        instances.length
      );
      instMesh.castShadow = false;
      instMesh.receiveShadow = false;

      instances.forEach((p, i) => {
        // Compose the per-instance world transform.
        dummy.position.set(p.x, p.y, p.z);
        dummy.rotation.set(0, p.ry, 0);
        dummy.scale.setScalar(p.scale);
        dummy.updateMatrix();

        // Multiply: instanceWorld = instanceTransform x meshLocalOffset
        const combined = dummy.matrix.clone().multiply(localMatrix);
        instMesh.setMatrixAt(i, combined);
      });

      instMesh.instanceMatrix.needsUpdate = true;
      scene.add(instMesh);
    }
  }
}

function computePlacements() {
  const placements = [];

  for (let c = 0; c < CLUSTER_COUNT; c++) {
    const clusterAngle = (c / CLUSTER_COUNT) * Math.PI * 2;
    const cx = START_POINT.x + Math.cos(clusterAngle) * TREE_RING_RADIUS;
    const cz = START_POINT.z + Math.sin(clusterAngle) * TREE_RING_RADIUS;

    const clusterTypes = shuffle([
      'pine',
      'dead',
      'ico',
      choose(['pine', 'dead', 'ico']),
      choose(['pine', 'dead', 'ico'])
    ]);

    for (let t = 0; t < TREES_PER_CLUSTER; t++) {
      const treeType = clusterTypes[t];
      const treeArray = treeModels[treeType];
      if (!treeArray || treeArray.length === 0) continue;

      const treeAngle = (t / TREES_PER_CLUSTER) * Math.PI * 2 + rand(-0.15, 0.15);
      const treeDistance = rand(3, 6);

      placements.push({
        variant: choose(treeArray),
        x: cx + Math.cos(treeAngle) * treeDistance,
        y: 0,
        z: cz + Math.sin(treeAngle) * treeDistance,
        ry: rand(0, Math.PI * 2),
        scale: rand(0.9, 1.15),
      });
    }
  }

  return placements;
}

async function loadAllModels() {
  const jobs = [];

  for (const [type, files] of Object.entries(modelManifest)) {
    treeModels[type] = [];

    for (const file of files) {
      jobs.push(
        loadGLTF(`../assets/trees/${file}`)
          .then((gltf) => {
            treeModels[type].push(gltf.scene);
          })
          .catch((error) => {
            console.error(`Error loading ${file}:`, error);
          })
      );
    }
  }

  await Promise.all(jobs);

  const placements = computePlacements();
  buildInstances(placements);
}

loadAllModels();

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new PointerLockControls(camera, renderer.domElement);
scene.add(controls.getObject());

camera.position.set(START_POINT.x, 1.7, START_POINT.z);
camera.lookAt(START_POINT.x + 1, 1.7, START_POINT.z);

const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => controls.lock());
controls.addEventListener('lock',   () => overlay.style.display = 'none');
controls.addEventListener('unlock', () => overlay.style.display = 'flex');

const keys = {};
document.addEventListener('keydown', (e) => { keys[e.code] = true;  e.preventDefault(); });
document.addEventListener('keyup',   (e) => { keys[e.code] = false; });

// ── Animate ───────────────────────────────────────────────────────────────────
// PERF: _moveDir is allocated ONCE here at module scope instead of
// new THREE.Vector3() on every animation frame. Repeated allocation creates
// garbage-collection pressure that causes micro-stutters during mouse-look.
const _moveDir = new THREE.Vector3();

let prev = performance.now();

function animate() {
  requestAnimationFrame(animate);

  if (controls.isLocked) {
    const now   = performance.now();
    const delta = Math.min((now - prev) / 1000, 0.1);
    prev = now;

    const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 10 : 5;

    // Reuse the pre-allocated vector — just reset it each frame.
    _moveDir.set(0, 0, 0);

    if (keys['KeyW'] || keys['ArrowUp'])    _moveDir.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  _moveDir.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  _moveDir.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) _moveDir.x += 1;

    _moveDir.normalize();

    controls.moveForward(-_moveDir.z * speed * delta);
    controls.moveRight(   _moveDir.x * speed * delta);

    camera.position.y = 3.7;
  } else {
    prev = performance.now();
  }

  renderer.render(scene, camera);
}

animate();

// Debug stats
setInterval(() => {
  console.log(
    'Triangles:', renderer.info.render.triangles,
    'Draw calls:', renderer.info.render.calls
  );
}, 1000);

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
