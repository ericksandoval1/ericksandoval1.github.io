<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE              from 'three';
import { GLTFLoader }          from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls }       from 'three/addons/controls/OrbitControls.js';

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.Fog(0x111111, 20, 80);

// ─── Camera ──────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(
  75,                                  // field of view
  window.innerWidth / window.innerHeight,
  0.1,                                 // near clip
  1000                                 // far clip
);
camera.position.set(0, 2, 10);

// ─── Controls ────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// ─── Lights ──────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
sun.position.set(10, 20, 10);
sun.castShadow = true;
scene.add(sun);

// ─── Ground ──────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshStandardMaterial({ color: 0x222222 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Load GLB models ─────────────────────────────────────────────────────────
const loader = new GLTFLoader();

function loadModel(path, { x = 0, y = 0, z = 0, scale = 1, rotY = 0 } = {}) {
  loader.load(
    path,
    (gltf) => {
      const model = gltf.scene;
      model.position.set(x, y, z);
      model.scale.setScalar(scale);
      model.rotation.y = rotY;
      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      scene.add(model);
    },
    undefined,
    (err) => console.error('Failed to load', path, err)
  );
}

// ─── Trees (z = 0) ───────────────────────────────────────────────────────────
loadModel('assets/trees/pine_tree.glb',         { x: -33, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/pine_tree2.glb',        { x: -30, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/pine_tree3.glb',        { x: -27, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/pine_tree4.glb',        { x: -24, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/pine_tree_yellow.glb',  { x: -21, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/pine_tree_yellow2.glb', { x: -18, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/pine_tree_yellow3.glb', { x: -15, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/pine_tree_yellow4.glb', { x: -12, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree.glb',          { x:  -9, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree2.glb',         { x:  -6, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree3.glb',         { x:  -3, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree_yellow.glb',   { x:   0, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree_yellow2.glb',  { x:   3, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree_yellow3.glb',  { x:   6, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree_orange.glb',   { x:   9, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree_orange2.glb',  { x:  12, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/ico_tree_orange3.glb',  { x:  15, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/dead_tree.glb',         { x:  18, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/dead_tree2.glb',        { x:  21, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/dead_tree3.glb',        { x:  24, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/dead_tree4.glb',        { x:  27, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/dead_tree5.glb',        { x:  30, y: 0, z: 0, scale: 1 });
loadModel('assets/trees/dead_tree6.glb',        { x:  33, y: 0, z: 0, scale: 1 });

// ─── TVs (z = 6, behind the trees) ──────────────────────────────────────────
loadModel('assets/tv_models/old_crt_grey.glb',  { x: -8, y: 0, z: 6, scale: 1 });
loadModel('assets/tv_models/oled_black.glb',    { x: -4, y: 0, z: 6, scale: 1 });
loadModel('assets/tv_models/oled_silver.glb',   { x:  0, y: 0, z: 6, scale: 1 });
loadModel('assets/tv_models/plastic_crt.glb',   { x:  4, y: 0, z: 6, scale: 1 });
loadModel('assets/tv_models/wood_crt.glb',      { x:  8, y: 0, z: 6, scale: 1 });

// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Render loop ─────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
